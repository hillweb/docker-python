name: Docker Build & Push

on:
  # push:
  #   branches:
  #     - main
  #     - master
  # pull_request:
  #   branches:
  #     - main
  #     - master
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    # 设置权限，允许推送镜像
    permissions:
      contents: read
      packages: write   # 推送到 GitHub Container Registry 需要

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 如果你也想推送到 Docker Hub，取消注释下面部分并添加 secrets
      # - name: 登录 Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成 Docker 镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            # docker.io/${{ secrets.DOCKERHUB_USERNAME }}/your-image-name   # 如果使用 Docker Hub
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}   # PR 时只构建不推送
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64     # 如需多平台支持可改成 linux/amd64,linux/arm64

      - name: 构建完成提示
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ 镜像构建并推送成功！"
          echo "镜像地址："
          echo "ghcr.io/${{ github.repository }}:latest"
